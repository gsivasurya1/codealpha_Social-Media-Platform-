<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Profile - SocialHub</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav class="navbar">

    <div class="logo">
        SocialHub
    </div>

    <ul>
        <li><a href="feed.html">Home</a></li>
        <li><a href="profile.html">Profile</a></li>
    </ul>

</nav>

<div class="profile-container">

    <div class="profile-card">

        <img src="https://via.placeholder.com/150"
             alt="Profile Image"
             class="profile-image">

        <h2 id="profileName">
            Username
        </h2>

        <p id="profileBio">
            Welcome to my profile.
        </p>

        <div class="profile-stats">

            <div>
                <h3 id="followersCount">0</h3>
                <p>Followers</p>
            </div>

            <div>
                <h3 id="followingCount">0</h3>
                <p>Following</p>
            </div>

            <div>
                <h3 id="postsCount">0</h3>
                <p>Posts</p>
            </div>

        </div>

        <button id="editProfileBtn">
            Edit Profile
        </button>

    </div>

    <div id="userPosts">

        <!-- User Posts -->

    </div>

</div>

<script src="js/app.js"></script>

</body>
</html>
